# L-Q 분기 전수 적재 — 무겁고 DART 호출이 잦으므로 수동 트리거(§8은 로컬/클라우드
# 실행을 권장 — Actions에서 돌릴 경우 한도 초과 시 체크포인트에서 재개).
name: quarterly-bulk

on:
  workflow_dispatch:
    inputs:
      year:
        description: "사업연도 (예: 2025)"
        required: true
      reprt_code:
        description: "11011(사업) 11012(반기) 11013(1분기) 11014(3분기)"
        required: true
        default: "11011"
      repair_tickers:
        description: "보강 모드(선택): 이미 적재된 보고서에서 누락된 종목코드만 안전하게 채워 넣음(공백 구분, 예: 047050). 비워두면 평소처럼 전수 적재."
        required: false
        default: ""
      recollect:
        description: "누락 재수집 모드(선택): true면 적재된 보고서와 상장 유니버스를 비교해 빠진 종목만 자동으로 다시 수집. repair_tickers보다 우선."
        required: false
        default: ""

permissions:
  contents: read
  actions: write        # self-continuation: 시간 예산 소진 시 새 런 재발행

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350          # 파이썬은 MAX_RUNTIME_MIN(320분)에 먼저 자체 종료
    env:
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}
      GDRIVE_TOKEN_FILE: token.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Restore Google Drive token
        run: echo "${{ secrets.GDRIVE_TOKEN_JSON_B64 }}" | base64 -d > token.json
      - name: Collect (전수 적재 / 누락 재수집 / 보강)
        run: |
          if [ -n "${{ github.event.inputs.recollect }}" ]; then
            python run_quarterly.py ${{ github.event.inputs.year }} ${{ github.event.inputs.reprt_code }} \
              --recollect
          elif [ -n "${{ github.event.inputs.repair_tickers }}" ]; then
            python run_quarterly.py ${{ github.event.inputs.year }} ${{ github.event.inputs.reprt_code }} \
              --repair ${{ github.event.inputs.repair_tickers }}
          else
            python run_quarterly.py ${{ github.event.inputs.year }} ${{ github.event.inputs.reprt_code }}
          fi
      - name: Self-continue (시간 예산 소진 시 새 런 재발행)
        # 전수 적재만 self-continue 대상(보강은 소수, 재수집은 재실행 시 남은 누락분만 자동 계산)
        if: success() && github.event.inputs.repair_tickers == '' && github.event.inputs.recollect == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f .continue_needed ]; then
            echo "time budget reached — dispatching continuation run"
            gh workflow run quarterly.yml --ref main \
              -f year=${{ github.event.inputs.year }} \
              -f reprt_code=${{ github.event.inputs.reprt_code }} \
              -R ${{ github.repository }}
          fi
