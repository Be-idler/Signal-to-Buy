# 트랙1 — 일일 단도 파이프라인 (명세서 §2 타임라인)
# 스케줄은 외부 크론(cron-job.org)이 repository_dispatch API로 정시에 쏜다
# (GitHub schedule 크론은 수 시간씩 지연·누락돼 폐기 — 일정 정확 준수 목적):
#   POST https://api.github.com/repos/Be-idler/Signal-to-Buy/dispatches
#   · "Signal to Buy" 잡 (월–금 KST 08:05) → {"event_type":"signal-to-buy"} → trigger_a
#   · "Signal notify" 잡 (월–금 KST 09:20) → {"event_type":"signal-notify"} → trigger_b
# KRX OpenAPI는 시세를 익영업일 08:00경 발행하므로 두 트리거 모두 **전영업일**
# (월요일→금요일, 직전 평일 휴장 시 그 이전 거래일) 데이터로 분석·발송한다.
name: track1-daily

on:
  repository_dispatch:
    types:
      - signal-to-buy       # trigger_a (권장 event_type)
      - signal-notify       # trigger_b (권장 event_type)
      - notify-dispatch     # trigger_b (기존 cron-job.org 잡이 쓰는 event_type)
      - trigger_a           # 별칭 허용
      - trigger_b
      - "Signal to Buy"     # cron-job.org 잡 이름을 그대로 쓴 경우도 허용
      - "Signal notify"
  workflow_dispatch:
    inputs:
      stage:
        description: "trigger_a | trigger_b"
        required: true
        default: "trigger_a"
      date:
        description: "기준일 YYYYMMDD (생략 시 오늘 — 백필·테스트용)"
        required: false
        default: ""
      test:
        description: "테스트 발송 표시 (trigger_b 전용, 🧪 태그)"
        required: false
        default: "false"
      basis:
        description: "재무 기준 보고서 강제 (trigger_a 전용, 예: 2025_11014)"
        required: false
        default: ""

# 스테이지별 동시성 그룹 — 같은 스테이지의 새 실행이 뜨면 앞선(멈춰 있을 수 있는)
# 실행을 취소한다. 멈춘 런이 러너를 오래 붙잡아 분과금·러너 고갈을 유발하던 문제
# (러너 미할당으로 후속 잡이 즉시 실패) 재발 방지. A(signal-to-buy)와 B(signal-notify)
# 는 다른 그룹이라 서로 취소하지 않는다. workflow_dispatch는 inputs.stage로, 외부
# 크론(repository_dispatch)은 event action으로 그룹을 나눈다.
concurrency:
  group: track1-${{ github.event.inputs.stage || github.event.action }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    # 하드 상한 — 인프라 저하로 멈춘 런이 러너·분과금을 무한정 태우지 않도록 상한한다.
    # trigger_a: 그레이스 폴링(≤30분)+수집, trigger_b: 배치 대기(≤15분)+처리.
    timeout-minutes: 60
    env:
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CUSTOMS_COUNTRY_API_KEY: ${{ secrets.CUSTOMS_COUNTRY_API_KEY }}
      CUSTOMS_REGION_API_KEY: ${{ secrets.CUSTOMS_REGION_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}
      GDRIVE_TOKEN_FILE: token.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Restore Google Drive token
        run: echo "${{ secrets.GDRIVE_TOKEN_JSON_B64 }}" | base64 -d > token.json
      # repository_dispatch는 event_type(github.event.action)으로 스테이지를 라우팅한다
      # — 벽시계 기준 판정은 실행 지연 시 스테이지가 뒤바뀌므로 쓰지 않는다.
      - name: Decide stage
        id: stage
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "stage=${{ github.event.inputs.stage }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.event.action }}" in
              signal-notify|notify-dispatch|trigger_b|"Signal notify")
                echo "stage=trigger_b" >> "$GITHUB_OUTPUT" ;;
              *)
                echo "stage=trigger_a" >> "$GITHUB_OUTPUT" ;;
            esac
          fi
      # date/test/basis는 workflow_dispatch 입력 또는 repository_dispatch의
      # client_payload로 전달할 수 있다(외부에서 API 백필·테스트 발송 가능).
      - name: Run stage
        run: |
          STAGE="${{ steps.stage.outputs.stage }}"
          DATE="${{ github.event.inputs.date || github.event.client_payload.date }}"
          TEST="${{ github.event.inputs.test || github.event.client_payload.test }}"
          BASIS="${{ github.event.inputs.basis || github.event.client_payload.basis }}"
          ARGS=""
          if [ -n "$DATE" ]; then
            ARGS="$ARGS --date $DATE"
          fi
          if [ "$TEST" = "true" ] && [ "$STAGE" = "trigger_b" ]; then
            ARGS="$ARGS --test"
          fi
          if [ -n "$BASIS" ] && [ "$STAGE" = "trigger_a" ]; then
            ARGS="$ARGS --basis $BASIS"
          fi
          python "run_${STAGE}.py" $ARGS
      # 트랙3 워치리스트 — 트리거 A 직후 같은 런에서 점검(트리거 A가 방금 쓴 EOD 재사용).
      # watchlist.yaml이 비어있으면 즉시 스킵되므로 무해하다.
      - name: Watchlist (트랙3)
        if: steps.stage.outputs.stage == 'trigger_a'
        run: python run_watchlist.py
